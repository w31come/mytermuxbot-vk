<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Token Auto</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-blue { background: #0077ff; color: white; }
        .btn-blue:disabled { background: #99caff; }
        .token { background: #f0f2f5; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 10px 0; }
        .hidden { display: none; }
        .status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .ok { background: #e8f5e9; color: #2e7d32; }
        .err { background: #ffebee; color: #c62828; }
        .info { background: #e3f2fd; color: #1565c0; }
        input { width: 100%; padding: 10px; border: 1px solid #d3d9de; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
        label { font-size: 14px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔑 VK Token Auto</h2>
    <div id="status" class="status hidden"></div>
    
    <label>GitHub Token (ghp_...):</label>
    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
    
    <label>Gist ID (если есть):</label>
    <input type="text" id="gistId" placeholder="оставь пустым для создания">
    
    <button class="btn-blue" id="btn" onclick="autoToken()">🚀 Получить и сохранить</button>
    
    <div id="result" class="hidden">
        <p><b>Токен:</b></p>
        <div class="token" id="token"></div>
    </div>
    
    <p style="font-size: 13px; color: #818c99; margin-top: 10px;" id="hint">Нажми кнопку — всё автоматически</p>
</div>

<script>
const APP_ID = 54634841;
let bridge = null;

function show(text, type) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + type;
    el.classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        bridge = vkBridge.default || vkBridge;
        await bridge.send('VKWebAppInit');
        show('✅ Готово', 'ok');
    } catch (e) {
        show('❌ Ошибка: ' + e.message, 'err');
    }
});

async function autoToken() {
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Загрузка...';
    
    try {
        // 1. Получаем VK токен
        show('Получаем VK токен...', 'info');
        const vk = await bridge.send('VKWebAppGetAuthToken', {
            app_id: APP_ID,
            scope: 'wall,friends,photos,groups,video,docs,status'
        });
        
        if (!vk.access_token) throw new Error('Токен не получен');
        
        document.getElementById('token').textContent = vk.access_token;
        document.getElementById('result').classList.remove('hidden');
        
        // 2. Сохраняем в Gist
        const gh = document.getElementById('githubToken').value.trim();
        const gid = document.getElementById('gistId').value.trim();
        
        if (!gh) {
            show('✅ Токен получен! Введи GitHub Token для сохранения', 'ok');
            btn.disabled = false;
            btn.textContent = '🚀 Получить и сохранить';
            return;
        }
        
        show('Сохраняем в Gist...', 'info');
        
        const content = JSON.stringify({
            access_token: vk.access_token,
            created_at: new Date().toISOString(),
            app_id: APP_ID
        }, null, 2);
        
        let resp;
        if (gid) {
            resp = await fetch(`https://api.github.com/gists/${gid}`, {
                method: 'PATCH',
                headers: {'Authorization': `token ${gh}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({files: {'vk_token.json': {content}}})
            });
        } else {
            resp = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {'Authorization': `token ${gh}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({
                    description: 'VK Token Auto',
                    public: false,
                    files: {'vk_token.json': {content}}
                })
            });
        }
        
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message);
        
        if (!gid) {
            document.getElementById('gistId').value = data.id;
        }
        
        show(`✅ Готово! Gist ID: ${data.id}`, 'ok');
        document.getElementById('hint').innerHTML = 
            `<b>Скопируй в скрипт:</b><br>` +
            `GIST_ID = "${data.id}"<br>` +
            `GITHUB_TOKEN = "${gh.substring(0, 10)}..."`;
        
    } catch (e) {
        console.error(e);
        show('❌ ' + (e.error_data?.error_reason || e.message), 'err');
    } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Получить и сохранить';
    }
}
</script>

</body>
</html>
