<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Token</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-blue { background: #0077ff; color: white; }
        .btn-purple { background: #7356bf; color: white; margin-top: 10px; }
        .token { background: #f0f2f5; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 10px 0; }
        .hidden { display: none; }
        .status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .ok { background: #e8f5e9; color: #2e7d32; }
        .err { background: #ffebee; color: #c62828; }
        .info { background: #e3f2fd; color: #1565c0; }
        input { width: 100%; padding: 10px; border: 1px solid #d3d9de; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
        label { font-size: 14px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔑 VK Token Auto</h2>
    <div id="status" class="status hidden"></div>
    
    <label>GitHub Token:</label>
    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
    
    <label>Gist ID (оставь пустым):</label>
    <input type="text" id="gistId" placeholder="необязательно">
    
    <button class="btn-blue" onclick="autoGetToken()">🚀 Получить и сохранить</button>
    
    <div id="result" class="hidden">
        <p><b>Токен:</b></p>
        <div class="token" id="token"></div>
    </div>
    
    <p style="font-size: 13px; color: #818c99; margin-top: 10px;" id="hint">Нажми кнопку для автоматического получения</p>
</div>

<script>
const APP_ID = 54634841;
let bridge = null;
let vkToken = null;

function showStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + type;
    el.classList.remove('hidden');
}

// Инициализация
document.addEventListener('DOMContentLoaded', async function() {
    try {
        bridge = vkBridge.default || vkBridge;
        await bridge.send('VKWebAppInit');
        showStatus('✅ Готово', 'ok');
    } catch (e) {
        showStatus('❌ Ошибка инициализации: ' + e.message, 'err');
    }
});

async function autoGetToken() {
    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Загрузка...';
    
    try {
        // 1. Получаем VK токен
        showStatus('Получаем VK токен...', 'info');
        const vkResult = await bridge.send('VKWebAppGetAuthToken', {
            app_id: APP_ID,
            scope: 'wall,friends,photos,groups,video,docs,status'
        });
        
        if (!vkResult.access_token) {
            throw new Error('Токен не получен');
        }
        
        vkToken = vkResult.access_token;
        document.getElementById('token').textContent = vkToken;
        document.getElementById('result').classList.remove('hidden');
        
        // 2. Сохраняем в Gist
        const githubToken = document.getElementById('githubToken').value.trim();
        const gistId = document.getElementById('gistId').value.trim();
        
        if (githubToken) {
            showStatus('Сохраняем в Gist...', 'info');
            await saveToGist(githubToken, gistId, vkToken);
            showStatus('✅ Готово! Токен сохранён в Gist', 'ok');
        } else {
            showStatus('✅ Токен получен! Введи GitHub Token для автосохранения', 'ok');
        }
        
    } catch (e) {
        console.error(e);
        showStatus('❌ ' + (e.error_data?.error_reason || e.message), 'err');
    } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Получить и сохранить';
    }
}

async function saveToGist(githubToken, gistId, token) {
    const content = JSON.stringify({
        access_token: token,
        created_at: new Date().toISOString(),
        app_id: APP_ID
    }, null, 2);
    
    let response;
    
    if (gistId) {
        response = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: {
                'Authorization': `token ${githubToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                files: {
                    'vk_token.json': { content: content }
                }
            })
        });
    } else {
        response = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: {
                'Authorization': `token ${githubToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                description: 'VK Token',
                public: false,
                files: {
                    'vk_token.json': { content: content }
                }
            })
        });
    }
    
    const result = await response.json();
    
    if (!response.ok) {
        throw new Error(result.message);
    }
    
    if (!gistId) {
        document.getElementById('gistId').value = result.id;
    }
    
    return result.id;
}
</script>

</body>
</html>
